services:
  agent:
    build: .
    container_name: tabula_rasa_agent
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/data
      - ./agent:/app/agent
      - ./config.yaml:/app/config.yaml:ro
      - ./.git:/app/.git
    ports:
      - "127.0.0.1:8765:8765"   # Chat
      - "127.0.0.1:8766:8766"   # Monitor (real-time event stream)
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Australia/Perth
      - MOLTBOOK_API_KEY=${MOLTBOOK_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
          pids: 200
